version: '3.8'

services:
  backend:
    image: ghcr.io/akephisit/trackivity-backend:latest
    container_name: trackivity-backend
    restart: unless-stopped
    environment:
      # Database Connection String form Managed Service (e.g. Neon)
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@utrackivity.com}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "80:3000"
    healthcheck:
      # Hits /health which actually pings the DB; / is a static string and
      # would mask a broken Neon connection.
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
